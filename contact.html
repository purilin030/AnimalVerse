<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - AnimalVerse</title>
  <link rel="icon" href="assets/images/icons/logo-header.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/contact.css">
</head>
<body>
<div class="app-layout" id="app-layout">
  <div data-include="header"></div>

  <div data-include="sidebar"></div>
  <main class="main" id="main-content">
    <div class="contact-page">
      <div class="contact-info">
        <h1>Get in Touch</h1>
        <p class="text-muted">Have questions or suggestions? We'd love to hear from you!</p>
        <div class="contact-details">
          <div class="contact-detail">
            <span class="contact-detail__icon">??</span>
            <div><strong>Location</strong><p class="text-muted">UTAR, Kampar, Perak, Malaysia</p></div>
          </div>
          <div class="contact-detail">
            <span class="contact-detail__icon">???</span>
            <div><strong>Email</strong><p class="text-muted">jiunhong@example.com</p></div>
          </div>
          <div class="contact-detail">
            <span class="contact-detail__icon">??</span>
            <div><strong>Program</strong><p class="text-muted">BIS (Hons) Information Systems Engineering</p></div>
          </div>
        </div>
      </div>

      <div class="contact-form-wrapper">
        <h2>Send a Message</h2>
        <form class="contact-form" id="contact-form">
          <div class="form-group">
            <label class="form-label" for="contact-name">Name</label>
            <input class="form-input" type="text" id="contact-name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-email">Email</label>
            <input class="form-input" type="email" id="contact-email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-subject">Subject</label>
            <input class="form-input" type="text" id="contact-subject" placeholder="Subject">
          </div>
          <div class="form-group">
            <label class="form-label" for="contact-message">Message</label>
            <textarea class="form-textarea" id="contact-message" placeholder="Your message..." required></textarea>
          </div>
          <button class="btn btn--primary btn--lg" type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </main>

    <!-- Footer injected via data-include -->
    <div data-include="footer"></div>
  </div>

  <!-- Chatbot + Toast injected via data-include -->
  <div data-include="chatbot"></div>

  <script src="js/include.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/contact.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
