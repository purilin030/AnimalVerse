<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AnimalVerse</title>
  <meta name="description" content="Your personal control center.">
  <link rel="icon" href="assets/images/icons/logo-header.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/dashboard.css">
  <link rel="stylesheet" href="css/circular-gallery.css">
  <style>
    body {
      overflow-x: hidden;
    }
    .dashboard__actions--full-bleed {
      width: 100vw;
      margin-left: calc(50% - 50vw);
    }
  </style>
</head>
<body>
  <div class="app-layout" id="app-layout">
    <div data-include="header"></div>
    <div data-include="sidebar"></div>
    <!-- MAIN CONTENT -->
    <main class="main" id="main-content">
      <div class="dashboard" id="dashboard-root">

        <!-- ===== WELCOME SECTION ===== -->
        <section class="dashboard__welcome">
          <p class="dashboard__greeting" id="dash-greeting">Welcome,</p>
          <h1 class="dashboard__username" id="dash-username">Admin</h1>
          <p class="dashboard__question" id="dash-question">What would you want to do today?</p>
        </section>

        <!-- ===== ACTION CARDS ===== -->
        <section class="dashboard__actions dashboard__actions--full-bleed" style="height: 500px; position: relative;">
          <div id="circular-gallery-container" class="circular-gallery" tabindex="0" role="region" aria-label="Circular image gallery. Use left and right arrow keys to navigate."></div>
        </section>

        <!-- ===== STATS ROW ===== -->
        <section class="dashboard__stats-section" id="stats-section">
          <div class="dashboard__stats-grid" id="stats-grid">
            <!-- Populated by JS -->
          </div>
        </section>

      </div>
    </main>

    <!-- Footer injected via data-include -->
    <div data-include="footer"></div>
  </div>

  <!-- Chatbot + Toast injected via data-include -->
  <div data-include="chatbot"></div>

  <script defer src="js/include.js"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/config.key.js"></script>

  <script defer src="js/utils.js"></script>
  <script defer src="js/data.js"></script>
  <script defer src="js/router.js"></script>
  <script defer src="js/theme.js"></script>
  <script defer src="js/favorites.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/navigation.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/chatbot.js"></script>
  <script defer src="js/app.js"></script>

  <script type="module">
    import { App as CircularGalleryApp } from './js/circular-gallery.js';

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('circular-gallery-container');
      if (container) {
        const dashboardItems = [
          { image: 'assets/images/dashboard/browse_gallery.png', text: 'Browse Gallery', url: 'gallery.html' },
          { image: 'assets/images/dashboard/my_favorites.png', text: 'My Favorites', url: 'favorites.html' },
          { image: 'assets/images/dashboard/watch_later.png', text: 'Watch Later', url: 'favorites.html' },
          { image: 'assets/images/dashboard/liked_videos.png', text: 'Liked Videos', url: 'liked_vid.html' },
          { image: 'assets/images/dashboard/animal_map.png', text: 'Animal Map', url: 'map.html' },
          { image: 'assets/images/dashboard/categories.png', text: 'Categories', url: 'categories.html' },
          { image: 'assets/images/dashboard/statistics.png', text: 'Statistics', url: 'statistics.html' },
          { image: 'assets/images/dashboard/video_management.png', text: 'Video Management', url: 'dashboard.html#videos' },
          { image: 'assets/images/dashboard/user_management.png', text: 'User Management', url: 'dashboard.html#users' },
          { image: 'assets/images/dashboard/site_settings.png', text: 'Site Settings', url: 'dashboard.html#settings' },
        ];

        new CircularGalleryApp(container, {
          items: dashboardItems,
          bend: 3,
          textColor: '#0e0f0c',
          borderRadius: 0.05,
          font: '800 40px Inter',
          fontUrl: 'https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap',
          scrollSpeed: 2,
          scrollEase: 0.05
        });
      }
    });
  </script>
</body>
</html>
