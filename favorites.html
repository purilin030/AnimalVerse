<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites - AnimalVerse</title>
  <link rel="icon" href="assets/images/icons/logo-header.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/favorites.css">
</head>
<body>
<div class="app-layout" id="app-layout">
  <div data-include="header"></div>

  <div data-include="sidebar"></div>
  <main class="main" id="main-content">
    <div class="favorites-page">
      <h1>My Favorites</h1>

      <!-- Tabs -->
      <div class="favorites-tabs" id="favorites-tabs" role="tablist">
        <button class="favorites-tab favorites-tab--active" data-tab="favorites" role="tab" aria-selected="true" aria-controls="favorites-grid">Favorites</button>
        <button class="favorites-tab" data-tab="watchlater" role="tab" aria-selected="false" aria-controls="favorites-grid">Watch Later</button>
      </div>

      <div class="video-grid" id="favorites-grid" role="tabpanel">
        <div class="empty-state">
          <p class="text-muted">Select a tab to view your saved videos.</p>
        </div>
      </div>
    </div>
  </main>

    <!-- Footer injected via data-include -->
    <div data-include="footer"></div>
  </div>

  <!-- Chatbot + Toast injected via data-include -->
  <div data-include="chatbot"></div>

  <script defer src="js/include.js"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/data.js"></script>
  <script defer src="js/router.js"></script>
  <script defer src="js/theme.js"></script>
  <script defer src="js/favorites.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/navigation.js"></script>
  <script defer src="js/favorites-page.js"></script>
  <script defer src="js/chatbot.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
