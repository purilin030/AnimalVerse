<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Gallery - AnimalVerse</title>
  <meta name="description" content="Browse our collection of animal videos.">
  <link rel="icon" href="assets/images/icons/logo-header.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/gallery.css">
</head>
<body>
  <div class="app-layout" id="app-layout">
    <div data-include="header"></div>
    <div data-include="sidebar"></div>
    <!-- MAIN CONTENT -->
    <main class="main" id="main-content">
      <div class="gallery-page">
        <div class="gallery-page__header">
          <div class="gallery-page__title-group">
            <span class="gallery-page__subtitle">EXPLORE THE WILD</span>
            <h1 class="gallery-page__title">Discovery Gallery</h1>
          </div>
          <span class="gallery-page__badge" id="results-count">Loading...</span>
        </div>

        <!-- Filters -->
        <div class="gallery-filters" id="gallery-filters">
          <div class="gallery-filters__categories" id="category-filters">
            <button class="filter-pill filter-pill--active" data-category="all">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
              <span>All</span>
            </button>
            <button class="filter-pill" data-category="mammals">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"></path><path d="M17.5 9c.83 0 1.5-.67 1.5-1.5S18.33 6 17.5 6 16 6.67 16 7.5s.67 1.5 1.5 1.5z"></path><path d="M6.5 9C7.33 9 8 8.33 8 7.5S7.33 6 6.5 6 5 6.67 5 7.5 5.67 9 6.5 9z"></path><path d="M12 21c2.2 0 4-1.8 4-4 0-1.5-1-2.5-2.5-3.5C13 13 12 13.5 12 13.5s-1-.5-1.5-1c-1.5 1-2.5 2-2.5 3.5 0 2.2 1.8 4 4 4z"></path></svg>
              <span>Mammals</span>
            </button>
            <button class="filter-pill" data-category="birds">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10c3-3 6-3 9 1 3-4 6-4 9-1m-18 4c2.5-2.5 5-2.5 7.5.5 2.5-3 5-3 7.5.5"></path><path d="M12 11c0 2-1 4-3 5m3-5c0 2 1 4 3 5"></path></svg>
              <span>Birds</span>
            </button>
            <button class="filter-pill" data-category="reptiles">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v4M16 3v4M12 7v10M12 17c0 2.2-1.8 4-4 4m4-4c0 2.2 1.8 4 4 4M4 11h16"></path></svg>
              <span>Reptiles</span>
            </button>
            <button class="filter-pill" data-category="amphibians">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.7 2.8-1.7 3.5.7.5 1.2 1.2 1.5 2a5 5 0 0 1-7.6 0c.3-.8.8-1.5 1.5-2A4.2 4.2 0 0 1 8 6a4 4 0 0 1 4-4z"></path><path d="M6 18c0-3 3-5 6-5s6 2 6 5M4 22h16"></path></svg>
              <span>Amphibians</span>
            </button>
            <button class="filter-pill" data-category="aquatic">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12c4-4 12-4 16 0 2 2 3 1 4-1M18 12c-2.5 2.5-6.5 3-10 2l-3 3v-6l3 3M2 12c3 3 9 3 13 1"></path><circle cx="16" cy="10" r="1" fill="currentColor"></circle></svg>
              <span>Aquatic</span>
            </button>
          </div>

          <div class="gallery-filters__extras">
            <div class="gallery-filters__tags" id="tag-filters">
              <button class="tag-chip" data-tag="wild">Wild</button>
              <button class="tag-chip" data-tag="pet">Pet</button>
              <button class="tag-chip" data-tag="documentary">Documentary</button>
            </div>

            <!-- Custom Dropdown with Hidden Native Select for compatibility -->
            <div class="custom-dropdown" id="sort-dropdown">
              <button class="custom-dropdown__trigger" id="sort-trigger" type="button">
                <span class="custom-dropdown__selected">Newest</span>
                <svg class="custom-dropdown__arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
              </button>
              <div class="custom-dropdown__menu">
                <div class="custom-dropdown__item custom-dropdown__item--active" data-value="newest">Newest</div>
                <div class="custom-dropdown__item" data-value="oldest">Oldest</div>
                <div class="custom-dropdown__item" data-value="az">A-Z</div>
                <div class="custom-dropdown__item" data-value="popular">Most Popular</div>
              </div>
              <select id="sort-select" style="display: none;">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="az">A-Z</option>
                <option value="popular">Most Popular</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Video Grid -->
        <div class="video-grid" id="gallery-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </main>

    <!-- Footer injected via data-include -->
    <div data-include="footer"></div>
  </div>

  <!-- Chatbot + Toast injected via data-include -->
  <div data-include="chatbot"></div>

  <script src="js/include.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
