<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Map - AnimalVerse</title>
  <link rel="icon" href="assets/images/icons/logo-header.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/map.css">
</head>
<body class="theme-pixel">
<div class="app-layout" id="app-layout">
  <div data-include="header"></div>

  <div data-include="sidebar"></div>
  <main class="main main--full" id="main-content">
    <div class="map-page">
      <div class="map-page__header">
        <h1>Animal Map</h1>
        <p class="map-page__subtitle">Explore animal origins around the world</p>
      </div>
      <div class="map-wrapper">
        <div id="animal-map" aria-label="Interactive world map showing animal observation locations"></div>
        <div class="map-legend" id="map-legend">
          <div class="map-legend__header">
            <span class="map-legend__title">Legend</span>
            <div class="map-legend__spinner" id="map-loader" title="Loading wildlife observations..."></div>
          </div>
          <button class="map-legend__item" data-category="mammals" type="button"><span class="map-legend__dot" style="background:var(--clr-cat-mammals)"></span>Mammals</button>
          <button class="map-legend__item" data-category="birds" type="button"><span class="map-legend__dot" style="background:var(--clr-cat-birds)"></span>Birds</button>
          <button class="map-legend__item" data-category="reptiles" type="button"><span class="map-legend__dot" style="background:var(--clr-cat-reptiles)"></span>Reptiles</button>
          <button class="map-legend__item" data-category="amphibians" type="button"><span class="map-legend__dot" style="background:var(--clr-cat-amphibians)"></span>Amphibians</button>
          <button class="map-legend__item" data-category="aquatic" type="button"><span class="map-legend__dot" style="background:var(--clr-cat-aquatic)"></span>Aquatic</button>
          <button class="map-legend__item" data-category="fish" type="button"><span class="map-legend__dot" style="background:var(--clr-cat-fish)"></span>Fish</button>
          <button class="map-legend__item" data-category="invertebrates" type="button"><span class="map-legend__dot" style="background:var(--clr-cat-invertebrates)"></span>Invertebrates</button>
          <div class="map-legend__divider"></div>
          <div class="map-legend__toggle-wrapper">
            <div class="map-legend__toggle-info">
              <span class="map-legend__toggle-label">Live Observations</span>
              <div class="map-tooltip">
                <svg class="map-tooltip__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                <div class="map-tooltip__box">
                  <h5 class="map-tooltip__title">Live Observations (iNaturalist)</h5>
                  <p class="map-tooltip__desc">Enable to pull real-time wildlife observations from iNaturalist based on your current map view.</p>
                  <p class="map-tooltip__hint">??When disabled, the map only shows the site's curated educational videos.</p>
                </div>
              </div>
            </div>
            <label class="map-switch">
              <input type="checkbox" id="observations-toggle">
              <span class="map-switch__slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </main>

    <!-- Footer injected via data-include -->
    <div data-include="footer"></div>
  </div>

  <!-- Chatbot + Toast injected via data-include -->
  <div data-include="chatbot"></div>

  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="js/include.js"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/config.key.js"></script>

  <script defer src="js/species-map.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/data.js"></script>
  <script defer src="js/router.js"></script>
  <script defer src="js/theme.js"></script>
  <script defer src="js/favorites.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/navigation.js"></script>
  <script defer src="js/map.js"></script>
  <script defer src="js/chatbot.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
