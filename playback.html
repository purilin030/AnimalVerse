<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing - AnimalVerse</title>
  <meta name="description" content="Watch animal videos.">
  <link rel="icon" href="assets/images/icons/logo-header.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/playback.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="app-layout" id="app-layout">
    <div data-include="header"></div>

    <div data-include="sidebar"></div>
    <!-- MAIN CONTENT -->
    <main class="main main--full" id="main-content">
      <div class="playback-page">
        <!-- Video Player -->
        <div class="playback-main">
          <div class="player-wrapper" id="player-container">
            <div class="player-loading">
              <p class="text-muted">Loading video...</p>
            </div>
          </div>

          <!-- Video Info -->
          <div class="video-info" id="video-info">
            <!-- Populated by JS -->
          </div>

          <!-- Location Mini-Map -->
          <div class="location-map" id="location-map" style="display:none;">
            <h3 class="location-map__title">Filming Location</h3>
            <div class="location-map__container" id="location-map-container" aria-label="Video filming location on map"></div>
          </div>
        </div>

        <!-- Related Videos -->
        <aside class="playback-sidebar">
          <h3 class="playback-sidebar__title">Related Videos</h3>
          <div class="related-videos" id="related-videos">
            <!-- Populated by JS -->
          </div>
        </aside>
      </div>
    </main>

    <!-- Footer injected via data-include -->
    <div data-include="footer"></div>
  </div>

  <!-- Chatbot + Toast injected via data-include -->
  <div data-include="chatbot"></div>

  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="js/include.js"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/data.js"></script>
  <script defer src="js/router.js"></script>
  <script defer src="js/theme.js"></script>
  <script defer src="js/favorites.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/navigation.js"></script>
  <script defer src="js/player.js"></script>
  <script defer src="js/chatbot.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
