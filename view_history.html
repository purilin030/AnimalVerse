<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View History - AnimalVerse</title>
  <link rel="icon" href="assets/images/icons/logo-header.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/favorites.css">
</head>
<body>
<div class="app-layout" id="app-layout">
  <!-- Header injected via data-include -->
  <div data-include="header"></div>

  <!-- Sidebar injected via data-include -->
  <div data-include="sidebar"></div>
  
  <main class="main" id="main-content">
    <div class="favorites-page">
      <h1>View History</h1>

      <div class="video-grid" id="history-grid">
        <div class="empty-state">
          <span class="empty-state__icon" style="font-size: 3rem; margin-bottom: var(--space-md); display: block; text-align: center;">⏱</span>
          <h2 style="font-size: var(--fs-xl); font-weight: var(--fw-bold); margin-bottom: var(--space-xs); text-align: center;">No History Yet</h2>
          <p class="text-muted" style="text-align: center; max-width: 400px; margin: 0 auto var(--space-lg);">Videos you watch will be listed here so you can easily find them again.</p>
          <div style="text-align: center;">
            <a class="btn btn--primary" href="gallery.html">Browse Videos</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer injected via data-include -->
  <div data-include="footer"></div>
</div>

<!-- Chatbot + Toast injected via data-include -->
<div data-include="chatbot"></div>

<script defer src="js/include.js"></script>
<script defer src="js/config.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/data.js"></script>
<script defer src="js/router.js"></script>
<script defer src="js/theme.js"></script>
<script defer src="js/favorites.js"></script>
<script defer src="js/ui.js"></script>
<script defer src="js/navigation.js"></script>
<script defer src="js/chatbot.js"></script>
<script defer src="js/app.js"></script>
</body>
</html>
